name: CI

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "lua/**"
      - "plugin/**"
      - "ftplugin/**"
      - "syntax/**"
      - "shared/bird2.vim"
      - "shared/**"
      - "scripts/**"
      - "tests/**"
      - ".changeset/**"
      - "CHANGELOG.md"
      - ".gitmodules"
      - ".luacheckrc"
      - ".stylua.toml"
      - ".github/workflows/**"
  pull_request:
    branches: ["main"]
    paths:
      - "lua/**"
      - "plugin/**"
      - "ftplugin/**"
      - "syntax/**"
      - "shared/bird2.vim"
      - "shared/**"
      - "scripts/**"
      - "tests/**"
      - ".changeset/**"
      - "CHANGELOG.md"
      - ".gitmodules"
      - ".luacheckrc"
      - ".stylua.toml"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changesets:
    name: Changelog changesets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
      - name: Validate pending changesets
        run: node scripts/changeset.mjs check

  compatibility:
    name: Neovim ${{ matrix.neovim }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        neovim: ["v0.9.5", "stable"]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: rhysd/action-setup-vim@v1
        with:
          version: ${{ matrix.neovim }}
          neovim: true
      - name: Run headless integration tests
        run: nvim --headless -u tests/minimal_init.lua -l tests/headless.lua
      - name: Source Vim syntax mirror
        run: nvim --headless -u NONE -c 'source syntax/bird2.vim' -c 'qa!'
      - name: Verify Vim syntax mirror
        run: cmp syntax/bird2.vim shared/bird2.vim/syntax/bird2.vim

  lua-lint:
    name: Lua lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck
      - name: Run Luacheck
        run: luacheck lua plugin ftplugin tests/headless.lua tests/minimal_init.lua

  stylua:
    name: StyLua
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: 2.5.2
          args: --check lua plugin ftplugin tests/headless.lua tests/minimal_init.lua
