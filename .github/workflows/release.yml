name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing standard SemVer tag to republish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Validate, package, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Setup Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          version: stable
          neovim: true

      - name: Validate release metadata
        id: release
        env:
          MANUAL_TAG: ${{ inputs.tag }}
        run: |
          TAG="${MANUAL_TAG:-$GITHUB_REF_NAME}"
          node scripts/changeset.mjs check-release
          node scripts/release.mjs gha-outputs "$TAG"

      - name: Run Neovim compatibility tests
        run: |
          nvim --headless -u tests/minimal_init.lua -l tests/headless.lua
          nvim --headless -u NONE -c 'source syntax/bird2.vim' -c 'qa!'

      - name: Build and verify release archives
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          node scripts/release.mjs package "$TAG" dist
          node scripts/release.mjs verify "$TAG" dist
          node scripts/release.mjs notes "$TAG" release-notes.md

      - name: Preserve verified release archives
        uses: actions/upload-artifact@v7
        with:
          name: BIRD.nvim-${{ steps.release.outputs.tag }}
          path: |
            dist/BIRD.nvim-${{ steps.release.outputs.tag }}.zip
            dist/BIRD.nvim-${{ steps.release.outputs.tag }}.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        run: |
          if [[ "$PRERELEASE" == "true" ]]; then
            state_flags=(--prerelease --latest=false)
          else
            state_flags=(--prerelease=false --latest)
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --verify-tag \
              --title "BIRD.nvim $VERSION" \
              --notes-file release-notes.md \
              "${state_flags[@]}"
          else
            gh release create "$TAG" \
              --verify-tag \
              --title "BIRD.nvim $VERSION" \
              --notes-file release-notes.md \
              "${state_flags[@]}"
          fi

          gh release upload "$TAG" \
            "dist/BIRD.nvim-$TAG.zip" \
            "dist/BIRD.nvim-$TAG.tar.gz" \
            dist/SHA256SUMS \
            --clobber
